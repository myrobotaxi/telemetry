version: 2

builds:
  - id: telemetry-server
    main: ./cmd/telemetry-server
    binary: telemetry-server
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

  - id: testbench
    main: ./cmd/testbench
    binary: testbench
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

  - id: simulator
    main: ./cmd/simulator
    binary: simulator
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

dockers:
  - image_templates:
      - "ghcr.io/myrobotaxi/telemetry:{{ .Tag }}"
      - "ghcr.io/myrobotaxi/telemetry:v{{ .Major }}"
      - "ghcr.io/myrobotaxi/telemetry:v{{ .Major }}.{{ .Minor }}"
      - "ghcr.io/myrobotaxi/telemetry:latest"
    dockerfile: Dockerfile
    ids:
      - telemetry-server
    build_flag_templates:
      - "--pull"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source={{.GitURL}}"
      - "--label=org.opencontainers.image.created={{.Date}}"

archives:
  - id: default
    formats: ['tar.gz']
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - '^chore:'

release:
  github:
    owner: myrobotaxi
    name: telemetry
  draft: false
  prerelease: auto
